name: validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          python -m json.tool .claude-plugin/marketplace.json >/dev/null
          python -m json.tool plugins/job-search/.claude-plugin/plugin.json >/dev/null
          python -m json.tool .agents/plugins/marketplace.json >/dev/null
          python -m json.tool plugins/job-search/.codex-plugin/plugin.json >/dev/null

      - name: Validate YAML
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import yaml

          paths = subprocess.check_output(["git", "ls-files", "-co", "--exclude-standard"], text=True).splitlines()
          for raw in paths:
              path = pathlib.Path(raw)
              if path.suffix not in {".yaml", ".yml"}:
                  continue
              with path.open(encoding="utf-8") as f:
                  yaml.safe_load(f)
          PY

      - name: Check ignored private files are absent
        run: |
          test ! -e plugins/job-search/config/personal-config.local.yaml
          test ! -e .env
          test ! -e .env.local
          test ! -e CLAUDE.md

      - name: Privacy denylist scan
        env:
          # Person-specific profile phrases live ONLY in this secret, never in
          # this public file (writing the PII you want to block into a public
          # denylist would leak it). Unset — e.g. on fork PRs — means the profile
          # check is skipped; the generic path/email/secret checks always run.
          PROFILE_DENYLIST: ${{ secrets.PROFILE_DENYLIST }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import sys

          # Generic patterns are not themselves PII, so they may live in this
          # public file.
          patterns = {
              "local-user-path": re.compile(r"/Users/[^\s)\]>'\"]+|~/Workspace"),
              "private-email": re.compile(r"[A-Za-z0-9._%+-]+@(gmail|icloud|me)\.com"),
              "secret-material": re.compile(
                  r"BEGIN (RSA|OPENSSH|PRIVATE)|api[_-]?key\s*[:=]|"
                  r"client[_-]?secret\s*[:=]|refresh[_-]?token\s*[:=]",
                  re.IGNORECASE,
              ),
          }

          # Person-specific profile phrases come from the PROFILE_DENYLIST secret
          # (pipe-separated literal terms). Each term is escaped and matched
          # literally, so the public file never contains the very PII it guards.
          profile_terms = [t.strip() for t in os.environ.get("PROFILE_DENYLIST", "").split("|") if t.strip()]
          if profile_terms:
              patterns["private-profile"] = re.compile("|".join(re.escape(t) for t in profile_terms))
          else:
              print("notice: PROFILE_DENYLIST not set — skipping person-specific profile checks (generic checks still run).")

          # Self-test: prove every active pattern is live before scanning real
          # files. The earlier regexes were silently dead due to over-escaping in
          # this quoted heredoc; this guard fails CI red if that ever recurs.
          # Fixtures here are generic and contain no PII; the profile pattern is
          # proven against a term from the secret, keeping this public file clean.
          self_test = [
              # (sample, should_match) — known-bad must HIT, known-good must MISS.
              ("/Users/foo/bar", True),
              ("~/Workspace/z", True),
              ("x@gmail.com", True),
              ("api_key=secret", True),
              ("client_secret: x", True),
              ("refresh_token=y", True),
              ("-----BEGIN RSA PRIVATE KEY-----", True),
              ("description of the api", False),
              ("please contact us anytime", False),
          ]
          self_test_failures = []
          for sample, should_match in self_test:
              hit = any(pattern.search(sample) for pattern in patterns.values())
              if hit != should_match:
                  self_test_failures.append(
                      f"self-test: {sample!r} expected match={should_match} got match={hit}"
                  )
          if profile_terms and not patterns["private-profile"].search(profile_terms[0]):
              self_test_failures.append("self-test: private-profile pattern failed to match its own first term")
          if self_test_failures:
              print("\n".join(self_test_failures))
              print("Privacy denylist self-test FAILED — patterns are not detecting as intended.")
              sys.exit(1)

          paths = subprocess.check_output(["git", "ls-files", "-co", "--exclude-standard"], text=True).splitlines()
          failures = []
          for raw in paths:
              path = pathlib.Path(raw)
              if not path.is_file():
                  continue
              if path.as_posix() == ".github/workflows/validate.yml":
                  continue
              if path.name.endswith((".png", ".jpg", ".jpeg", ".gif", ".webp")):
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for name, pattern in patterns.items():
                  if pattern.search(text):
                      failures.append(f"{path}: {name}")

          if failures:
              print("\n".join(failures))
              sys.exit(1)
          PY

      - name: Marketplace sanity check
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          marketplace = json.loads(pathlib.Path(".claude-plugin/marketplace.json").read_text())
          assert marketplace["name"] == "personal-skills"
          plugins = marketplace.get("plugins", [])
          assert plugins, "marketplace must list at least one plugin"
          for plugin in plugins:
              source = plugin["source"]
              if isinstance(source, str) and source.startswith("./"):
                  assert pathlib.Path(source).exists(), f"missing plugin source: {source}"
              for skill in plugin.get("skills", []):
                  assert pathlib.Path("plugins/job-search", skill, "SKILL.md").exists(), f"missing skill: {skill}"

          codex_marketplace = json.loads(pathlib.Path(".agents/plugins/marketplace.json").read_text())
          assert codex_marketplace["name"] == "personal-skills"
          codex_plugins = codex_marketplace.get("plugins", [])
          assert codex_plugins, "Codex marketplace must list at least one plugin"
          for plugin in codex_plugins:
              source = plugin["source"]
              if source.get("source") == "local":
                  assert pathlib.Path(source["path"]).exists(), f"missing Codex plugin source: {source['path']}"

          codex_plugin = json.loads(pathlib.Path("plugins/job-search/.codex-plugin/plugin.json").read_text())
          assert codex_plugin["name"] == "job-search"
          assert pathlib.Path("plugins/job-search", codex_plugin["skills"]).exists(), "missing Codex skills directory"
          PY
